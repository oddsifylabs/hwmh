<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background rounded square -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="#161920" stroke="#2a2f3a" stroke-width="2"/>
  
  <!-- Outer gear ring -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#3b82f6" stroke-width="2.5" opacity="0.9"/>
  <circle cx="32" cy="32" r="16" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
  
  <!-- Gear teeth (8 small rectangles around the circle) -->
  <g fill="#3b82f6" opacity="0.85">
    <rect x="30" y="8" width="4" height="5" rx="1"/>
    <rect x="30" y="51" width="4" height="5" rx="1"/>
    <rect x="8" y="30" width="5" height="4" rx="1"/>
    <rect x="51" y="30" width="5" height="4" rx="1"/>
    <rect x="14.5" y="14.5" width="4" height="4" rx="1" transform="rotate(45 16.5 16.5)"/>
    <rect x="45.5" y="14.5" width="4" height="4" rx="1" transform="rotate(45 47.5 16.5)"/>
    <rect x="14.5" y="45.5" width="4" height="4" rx="1" transform="rotate(45 16.5 47.5)"/>
    <rect x="45.5" y="45.5" width="4" height="4" rx="1" transform="rotate(45 47.5 47.5)"/>
  </g>
  
  <!-- Lightning bolt centered -->
  <path d="M34 14 L24 30 L30 30 L28 46 L40 28 L33 28 Z" 
        fill="#e8eaf0" 
        stroke="#e8eaf0" 
        stroke-width="1.5"
        stroke-linejoin="round"/>
  
  <!-- Small accent dot -->
  <circle cx="32" cy="32" r="2.5" fill="#3b82f6"/>
</svg>