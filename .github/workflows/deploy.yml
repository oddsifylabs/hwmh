name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_ID }} --environment production

      - name: Sync environment variables to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway variables set TELEGRAM_ALERT_BOT_TOKEN="${{ secrets.TELEGRAM_ALERT_BOT_TOKEN }}" --service ${{ secrets.RAILWAY_SERVICE_ID }} --environment production || true
          railway variables set TELEGRAM_ALERT_CHAT_ID="${{ secrets.TELEGRAM_ALERT_CHAT_ID }}" --service ${{ secrets.RAILWAY_SERVICE_ID }} --environment production || true
          railway variables set HWMH_BASE_URL="https://hwmh.oddsifylabs.com" --service ${{ secrets.RAILWAY_SERVICE_ID }} --environment production || true
